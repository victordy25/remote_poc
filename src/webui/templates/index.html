<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대화 → 리포트 데모</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <h1>대화 → 모니터링 리포트 (데모)</h1>
    <p class="muted"><code>sample.json</code>을 입력으로 파이프라인 실행 후 <code>output/</code>에 저장합니다.</p>
  </header>

  <main class="main">
    <section class="card">
      <h2>실행</h2>
      <p>입력 파일: <strong>sample.json</strong> · 마스터: <strong>poc/patient_master.example.json</strong> · 추출: <strong>mock</strong></p>
      <button type="button" id="btn-run" class="btn primary">리포트 생성</button>
      <p id="status" class="status" aria-live="polite"></p>
      <p id="paths" class="paths muted"></p>
    </section>

    <section class="card" id="panel-dialogue">
      <h2>입력 대화 (sample.json)</h2>
      <pre id="dialogue-preview" class="code">로딩 중…</pre>
    </section>

    <section class="card" id="panel-report">
      <h2>리포트 출력 (JSON Schema 인스턴스)</h2>
      <div id="report-formatted" class="report-root"></div>
      <details class="raw">
        <summary>원본 JSON</summary>
        <pre id="report-raw" class="code"></pre>
      </details>
    </section>

    <section class="card">
      <h2>중간 팩트 (extracted facts)</h2>
      <details open>
        <summary>팩트 JSON</summary>
        <pre id="facts-raw" class="code"></pre>
      </details>
    </section>
  </main>

  <script>
    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function isPlainObject(v) {
      return v !== null && typeof v === "object" && !Array.isArray(v);
    }

    function renderValue(v) {
      if (v === null || v === undefined) return '<span class="null">—</span>';
      if (typeof v === "boolean") return v ? "예" : "아니오";
      if (typeof v === "number") return esc(String(v));
      if (typeof v === "string") return esc(v);
      if (Array.isArray(v)) {
        if (v.length === 0) return '<span class="null">(없음)</span>';
        if (v.every((x) => typeof x === "string")) {
          return "<ul>" + v.map((x) => "<li>" + esc(x) + "</li>").join("") + "</ul>";
        }
        return "<pre class=\"code inline\">" + esc(JSON.stringify(v, null, 2)) + "</pre>";
      }
      return renderBlock(v);
    }

    function renderBlock(obj) {
      const keys = Object.keys(obj);
      if (!keys.length) return '<span class="null">(비어 있음)</span>';
      let html = '<dl class="kv">';
      for (const k of keys) {
        html += "<dt>" + esc(k) + "</dt><dd>";
        const v = obj[k];
        if (isPlainObject(v)) html += renderBlock(v);
        else html += renderValue(v);
        html += "</dd>";
      }
      html += "</dl>";
      return html;
    }

    function renderReport(report) {
      const root = document.getElementById("report-formatted");
      root.innerHTML = "";
      if (!report) {
        root.innerHTML = '<p class="muted">아직 생성된 리포트가 없습니다.</p>';
        return;
      }
      const order = ["A_대상자_정보", "B_복막투석_유형", "C_점검사항"];
      for (const key of order) {
        if (!(key in report)) continue;
        const sec = document.createElement("section");
        sec.className = "report-section";
        const h = document.createElement("h3");
        h.textContent = key;
        sec.appendChild(h);
        const inner = document.createElement("div");
        inner.className = "report-section-body";
        inner.innerHTML = renderBlock(report[key]);
        sec.appendChild(inner);
        root.appendChild(sec);
      }
    }

    async function loadDialoguePreview() {
      try {
        const r = await fetch("/api/input-preview");
        const j = await r.json();
        document.getElementById("dialogue-preview").textContent = JSON.stringify(j.bundle, null, 2);
      } catch (e) {
        document.getElementById("dialogue-preview").textContent = String(e);
      }
    }

    document.getElementById("btn-run").addEventListener("click", async () => {
      const st = document.getElementById("status");
      const paths = document.getElementById("paths");
      st.textContent = "실행 중…";
      paths.textContent = "";
      try {
        const r = await fetch("/api/run", { method: "POST" });
        const j = await r.json();
        if (!r.ok) throw new Error(j.detail || r.statusText);
        st.textContent = "완료 · run_" + j.run_id;
        paths.textContent =
          "저장: " + j.paths.report + ", " + j.paths.facts + ", " + j.paths.meta;
        renderReport(j.report);
        document.getElementById("report-raw").textContent = JSON.stringify(j.report, null, 2);
        document.getElementById("facts-raw").textContent = JSON.stringify(j.facts, null, 2);
      } catch (e) {
        st.textContent = "오류: " + e.message;
      }
    });

    async function tryLoadLatest() {
      try {
        const r = await fetch("/api/latest");
        const j = await r.json();
        if (j.report) {
          renderReport(j.report);
          document.getElementById("report-raw").textContent = JSON.stringify(j.report, null, 2);
        }
        if (j.facts) {
          document.getElementById("facts-raw").textContent = JSON.stringify(j.facts, null, 2);
        }
      } catch (_) {}
    }

    loadDialoguePreview();
    tryLoadLatest();
  </script>
</body>
</html>
